# ─────────────────────────────────────────────────────────────────────────────
# Peptide Activity Classifier — Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  pos_file:         "data/positive.txt"
  neg_file:         "data/negative.txt"
  embeddings_file:  "data/embeddings.pkl"

# ── ESM2 (only used when generating embeddings) ──────────────────────────────
esm:
  model_name:  "esm2_t33_650M_UR50D"
  device:      "cuda"
  batch_size:  32

# ── Train / Val / Test split ─────────────────────────────────────────────────
split:
  test_size:    0.10
  val_size:     0.10          # fraction of (total − test)
  random_seed:  42

# ── DataLoader ────────────────────────────────────────────────────────────────
dataloader:
  batch_size:      64
  shuffle_train:   true
  num_workers:     0

# ── Transformer Model ────────────────────────────────────────────────────────
model:
  # Chunking: split 1280-d embedding → num_chunks pseudo-tokens of chunk_dim each
  esm_embed_dim:   1280       # ESM2 t33_650M output dimension
  num_chunks:      16         # number of pseudo-tokens  (1280 / 16 = 80)
  chunk_dim:       80         # dimension of each chunk  (auto-derived, kept for clarity)
  # Transformer
  d_model:         256        # internal model dimension
  n_heads:         8          # attention heads  (d_model / n_heads = 16 per head)
  n_layers:        8          # encoder layers
  d_ff:            512        # feed-forward hidden dim
  dropout:         0.40       # dropout on attention, ff, and embeddings
  # Pooling before classifier head
  pool:            "cls"      # "cls" = prepend learnable [CLS] token | "mean" = average all tokens
  # Classification head
  num_classes:     2

# ── Training ──────────────────────────────────────────────────────────────────
training:
  epochs:          100
  lr:              3.0e-4
  weight_decay:    1.0e-4
  use_class_weights: false    # weight CE loss by inverse class frequency

  # ── Scheduler: linear warmup → CosineAnnealingWarmRestarts (SGDR) ───────────
  #
  #  Timeline example with warmup=5, T_0=10, T_mult=2:
  #
  #    Epochs 1-5   : linear warmup  (LR: 0 → base_lr)
  #    Epochs 6-15  : cosine cycle 0 (length 10, LR: base_lr → eta_min)
  #    Epochs 16-35 : cosine cycle 1 (length 20, LR: base_lr → eta_min)  ↺ restart
  #    Epochs 36-75 : cosine cycle 2 (length 40, LR: base_lr → eta_min)  ↺ restart
  #    ...
  #
  #  Set T_mult=1 for equal-length cycles (classic SGDR).
  #
  scheduler:
    warmup_epochs: 5         # linear ramp-up before SGDR begins
    T_0:           15         # epochs in the first cosine cycle
    T_mult:        1          # each restart multiplies cycle length by this factor
                              # (use 1 for fixed-length cycles)
    eta_min:       1.0e-6     # LR floor at the trough of every cycle

  # ── Early stopping ────────────────────────────────────────────────────────
  early_stopping:
    enabled:       true
    patience:      20         # epochs without val-loss improvement before stop
    min_delta:     1.0e-4     # minimum improvement to count

  # ── Checkpointing ────────────────────────────────────────────────────────
  checkpoint:
    dir:           "checkpoints"
    save_last:     true
    save_best:     true

  # ── Reproducibility / device ──────────────────────────────────────────────
  seed:            42
  device:          "cuda"     # falls back to cpu automatically

# ── Diagnostics ───────────────────────────────────────────────────────────────
diagnostics:

  # ── Gradient checks ─────────────────────────────────────────────────────────
  gradient_check:
    every_n_epochs:      10        # run every N epochs; set to 0 to disable
    vanishing_threshold: 1.0e-5   # global grad norm below this → vanishing warning
    exploding_threshold: 10.0     # global grad norm above this → exploding warning
    verbose:             false    # if true, print per-layer norms as well

  # ── Overfit checks ───────────────────────────────────────────────────────────
  overfit_check:
    every_n_epochs:             5    # run every N epochs; set to 0 to disable
    window:                     5    # number of recent epochs to average over
    loss_gap_threshold:         0.15 # val_loss − train_loss above this → overfit warning
    acc_gap_threshold:          0.10 # train_acc − val_acc above this → overfit warning
    underfitting_acc_threshold: 0.60 # train_acc below this → underfit warning